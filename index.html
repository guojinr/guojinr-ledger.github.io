<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>家族理財秘書</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
  </script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-[#FDF8F5]">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { ChevronLeft, ChevronRight, Plus, List, X, BookHeart, TrendingUp, TrendingDown, Wallet, Search, Trash2, Settings, Target, CheckCircle2, Share2, Camera, CheckSquare, Edit2, Check } from 'lucide-react';
    
    import { initializeApp } from 'firebase/app';
    import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut, signInAnonymously, signInWithCustomToken } from 'firebase/auth';
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from 'firebase/firestore';

    const firebaseConfig = {
      apiKey: "AIzaSyCyrzCgmatWzD0vlYhO3Zam3PCFqs_381Y",
      authDomain: "family-ledger-f0684.firebaseapp.com",
      databaseURL: "https://family-ledger-f0684-default-rtdb.firebaseio.com",
      projectId: "family-ledger-f0684",
      storageBucket: "family-ledger-f0684.firebasestorage.app",
      messagingSenderId: "531597410354",
      appId: "1:531597410354:web:5c65222deadda751b43c2b",
      measurementId: "G-S5VMJBZH7K"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const isPreview = typeof __firebase_config !== 'undefined';
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'family-ledger-app';

    function App() {
      const [user, setUser] = useState(null);
      const [isAuthLoading, setIsAuthLoading] = useState(true);
      const [loginError, setLoginError] = useState('');

      const [books, setBooks] = useState([]);
      const [transactions, setTransactions] = useState([]);
      const [currentBookId, setCurrentBookId] = useState('');

      const [isAddModalOpen, setIsAddModalOpen] = useState(false);
      const [isDetailsModalOpen, setIsDetailsModalOpen] = useState(false);
      const [isManageBooksOpen, setIsManageBooksOpen] = useState(false);
      const [isShareViewOpen, setIsShareViewOpen] = useState(false);
      
      const [currentDate, setCurrentDate] = useState(new Date(2026, 4, 29));
      const [selectedDate, setSelectedDate] = useState(null);
      const [selectedMonth, setSelectedMonth] = useState('2026-05');
      const [searchQuery, setSearchQuery] = useState('');

      const [formData, setFormData] = useState({ date: new Date().toISOString().split('T')[0], type: 'expense', amount: '', title: '', isCompleted: false });
      const [newBookData, setNewBookData] = useState({ name: '', type: 'standard', targetAmount: '' });
      
      const [editingBookId, setEditingBookId] = useState(null);
      const [editFormData, setEditFormData] = useState({ name: '', targetAmount: '' });

      const [editingTxId, setEditingTxId] = useState(null);
      const [editTxFormData, setEditTxFormData] = useState({ date: '', type: 'expense', amount: '', title: '', isCompleted: false });

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else if (isPreview) {
              await signInAnonymously(auth);
            }
          } catch (e) {
            console.error("Auth error", e);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
          setIsAuthLoading(false);
        });
        return () => unsubscribe();
      }, []);

      const loginWithGoogle = async () => {
        setLoginError('');
        const provider = new GoogleAuthProvider();
        try {
          await signInWithPopup(auth, provider);
        } catch (error) {
          console.error(error);
          setLoginError('登入失敗，請確認已在 Firebase 加入網域！');
        }
      };

      useEffect(() => {
        if (!user) return;

        const booksRef = collection(db, isPreview ? `artifacts/${appId}/users` : 'users', user.uid, 'books');
        const txRef = collection(db, isPreview ? `artifacts/${appId}/users` : 'users', user.uid, 'transactions');

        const unsubBooks = onSnapshot(booksRef, async (snapshot) => {
          const booksData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          
          if (booksData.length === 0) {
            const defaultBooks = [
              { id: '1', name: '哥哥的帳本', type: 'standard', targetAmount: 0 },
              { id: '4', name: '哥哥的家用', type: 'target', targetAmount: 10000 },
              { id: '5', name: '我的主帳本', type: 'standard', targetAmount: 0 }
            ];
            for (const b of defaultBooks) {
              await setDoc(doc(db, isPreview ? `artifacts/${appId}/users` : 'users', user.uid, 'books', b.id), b);
            }
          } else {
            setBooks(booksData);
            if (!currentBookId || !booksData.find(b => b.id === currentBookId)) {
              setCurrentBookId(booksData[0].id);
            }
          }
        }, console.error);

        const unsubTx = onSnapshot(txRef, (snapshot) => {
          setTransactions(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        }, console.error);

        return () => { unsubBooks(); unsubTx(); };
      }, [user, currentBookId]);

      const currentBook = books.find(b => b.id === currentBookId);
      const currentYear = currentDate.getFullYear();

      const currentBookTotalBalance = useMemo(() => {
        return transactions
          .filter(t => t.bookId === currentBookId)
          .reduce((total, t) => t.type === 'income' ? total + t.amount : total - t.amount, 0);
      }, [transactions, currentBookId]);

      const filteredTransactions = useMemo(() => {
        let currentTrans = transactions
          .filter(t => t.bookId === currentBookId)
          .sort((a, b) => new Date(b.date) - new Date(a.date));
        if (searchQuery) {
          const query = searchQuery.toLowerCase();
          currentTrans = currentTrans.filter(t => t.title.toLowerCase().includes(query) || t.amount.toString().includes(query));
        }
        return currentTrans;
      }, [transactions, currentBookId, searchQuery]);

      const getMonthData = (year, monthNum) => {
        const prefix = `${year}-${String(monthNum).padStart(2, '0')}`;
        const monthTxs = transactions.filter(t => t.bookId === currentBookId && t.date.startsWith(prefix));
        const sum = monthTxs.reduce((acc, t) => acc + (t.type === 'income' ? t.amount : -t.amount), 0);
        const isCompleted = monthTxs.some(t => t.isCompleted);
        const isTargetReached = sum >= (currentBook?.targetAmount || 0); 
        return { sum, isCompleted, isTargetReached, prefix, monthTxs };
      };

      const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
      const firstDayOfMonth = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();

      const getDaySummary = (day) => {
        const dateStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dayTrans = transactions.filter(t => t.bookId === currentBookId && t.date === dateStr);
        const income = dayTrans.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
        const expense = dayTrans.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
        return { income, expense, dateStr, dayTrans };
      };

      const formatAmountForGrid = (amount) => {
        if (amount >= 100000) return (amount / 1000).toFixed(0) + 'k';
        return amount.toString();
      };

      const handleAddTransaction = async (e) => {
        e.preventDefault();
        if (!formData.amount || !formData.title || !user) return;
        
        const newId = Date.now().toString();
        const newTx = {
          id: newId,
          bookId: currentBookId,
          date: formData.date,
          type: currentBook?.type === 'target' ? 'income' : formData.type,
          amount: Number(formData.amount),
          title: formData.title,
          isCompleted: formData.isCompleted
        };

        try {
          await setDoc(doc(db, isPreview ? `artifacts/${appId}/users` : 'users', user.uid, 'transactions', newId), newTx);
          if (currentBook?.type === 'target') setSelectedMonth(formData.date.substring(0, 7));
          setFormData({ ...formData, amount: '', title: '', isCompleted: false });
        } catch(err) {
          console.error(err);
        } finally {
          setIsAddModalOpen(false);
        }
      };

      // 修正：強化點擊阻擋，並給予完整預設值防止 React 報錯
      const startEditTx = (tx, e) => {
        e.preventDefault();  // 阻擋預設行為
        e.stopPropagation(); // 阻擋事件冒泡
        setEditingTxId(tx.id);
        setEditTxFormData({ 
          ...tx,
          amount: tx.amount || '',
          title: tx.title || '',
          date: tx.date || '',
          type: tx.type || 'expense',
          isCompleted: !!tx.isCompleted // 確保是 boolean
        });
      };

      const saveEditTx = async (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (!editTxFormData.amount || !editTxFormData.title || !user) return;
        try {
          await setDoc(doc(db, isPreview ? `artifacts/${appId}/users` : 'users', user.uid, 'transactions', editingTxId), { 
            ...editTxFormData, 
            amount: Number(editTxFormData.amount) 
          }, { merge: true });
        } catch(err) {
          console.error(err);
        } finally {
          setEditingTxId(null);
        }
      };

      const deleteTx = async (id, e) => {
        e.preventDefault();
        e.stopPropagation();
        if (!user) return;
        try {
          await deleteDoc(doc(db, isPreview ? `artifacts/${appId}/users` : 'users', user.uid, 'transactions', id));
        } catch(err) {
          console.error(err);
        }
      };

      const startEditBook = (book, e) => {
        e.preventDefault();
        e.stopPropagation();
        setEditingBookId(book.id);
        setEditFormData({ name: book.name, targetAmount: book.targetAmount || '' });
      };

      const saveEditBook = async (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (!editFormData.name || !user) return;
        try {
          const bookToEdit = books.find(b => b.id === editingBookId);
          await setDoc(doc(db, isPreview ? `artifacts/${appId}/users` : 'users', user.uid, 'books', editingBookId), {
            name: editFormData.name,
            targetAmount: bookToEdit?.type === 'target' ? Number(editFormData.targetAmount) : 0
          }, { merge: true });
        } catch(err) {
          console.error(err);
        } finally {
          setEditingBookId(null);
        }
      };

      const handleDeleteBook = async (id, e) => {
        e.preventDefault();
        e.stopPropagation();
        if (books.length <= 1 || !user) return alert('至少要保留一個帳本喔！');
        try {
          await deleteDoc(doc(db, isPreview ? `artifacts/${appId}/users` : 'users', user.uid, 'books', id));
          if (currentBookId === id) setCurrentBookId(books.filter(b => b.id !== id)[0].id);
        } catch(err) {
          console.error(err);
        }
      };

      const handleAddBook = async (e) => {
        e.preventDefault();
        if (!newBookData.name || !user) return;
        const newId = Date.now().toString();
        try {
          await setDoc(doc(db, isPreview ? `artifacts/${appId}/users` : 'users', user.uid, 'books', newId), {
            id: newId,
            name: newBookData.name,
            type: newBookData.type,
            targetAmount: newBookData.type === 'target' ? Number(newBookData.targetAmount) : 0
          });
          setNewBookData({ name: '', type: 'standard', targetAmount: '' });
        } catch(err) {
          console.error(err);
        }
      };

      const handlePrevPeriod = () => {
        currentBook?.type === 'target' 
          ? setCurrentDate(new Date(currentYear - 1, 0, 1))
          : setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
        setSelectedDate(null);
      };

      const handleNextPeriod = () => {
        currentBook?.type === 'target' 
          ? setCurrentDate(new Date(currentYear + 1, 0, 1))
          : setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
        setSelectedDate(null);
      };

      const renderTxItem = (tx) => {
        if (editingTxId === tx.id) {
          return (
            <div key={tx.id} className="bg-white p-4 rounded-2xl shadow-md border-2 border-rose-300 flex flex-col gap-3 animate-in fade-in w-full relative z-10">
              <div className="flex justify-between items-center mb-1">
                <span className="text-xs font-black text-rose-500 bg-rose-50 px-2 py-1 rounded-md">編輯模式</span>
              </div>
              <input type="date" value={editTxFormData.date} onChange={e => setEditTxFormData({...editTxFormData, date: e.target.value})} className="w-full bg-gray-50 p-2.5 rounded-xl outline-none font-bold text-sm border border-transparent focus:border-rose-400" />
              <input type="text" value={editTxFormData.title} onChange={e => setEditTxFormData({...editTxFormData, title: e.target.value})} className="w-full bg-gray-50 p-2.5 rounded-xl outline-none font-bold text-sm border border-transparent focus:border-rose-400" placeholder="請輸入項目名稱" />
              <div className="flex items-center gap-2 bg-gray-50 p-2.5 rounded-xl border border-transparent focus-within:border-rose-400">
                <span className="text-gray-400 font-bold text-xs shrink-0">NT$</span>
                <input type="number" value={editTxFormData.amount} onChange={e => setEditTxFormData({...editTxFormData, amount: e.target.value})} className="w-full bg-transparent outline-none font-black text-sm text-gray-800" min="1" />
              </div>
              {currentBook?.type === 'standard' && (
                <div className="flex gap-2">
                  <button type="button" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setEditTxFormData({...editTxFormData, type: 'expense'}); }} className={`flex-1 py-2 text-xs rounded-lg font-black transition-all ${editTxFormData.type === 'expense' ? 'bg-rose-500 text-white' : 'bg-gray-100 text-gray-500'}`}>支出</button>
                  <button type="button" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setEditTxFormData({...editTxFormData, type: 'income'}); }} className={`flex-1 py-2 text-xs rounded-lg font-black transition-all ${editTxFormData.type === 'income' ? 'bg-green-500 text-white' : 'bg-gray-100 text-gray-500'}`}>收入</button>
                </div>
              )}
              {currentBook?.type === 'target' && (
                <label className={`flex items-center gap-2 p-2.5 rounded-xl cursor-pointer transition-colors border ${editTxFormData.isCompleted ? 'bg-green-50 border-green-200' : 'bg-gray-50 border-transparent'}`}>
                  <input type="checkbox" checked={!!editTxFormData.isCompleted} onChange={e => setEditTxFormData({...editTxFormData, isCompleted: e.target.checked})} className="w-4 h-4 text-green-500 rounded accent-green-500" />
                  <span className="text-xs font-black text-green-700">確認結算此月</span>
                </label>
              )}
              <div className="flex justify-end gap-2 mt-2">
                <button type="button" onClick={(e) => { e.preventDefault(); e.stopPropagation(); setEditingTxId(null); }} className="px-5 py-2.5 bg-gray-100 text-gray-600 rounded-xl text-xs font-black hover:bg-gray-200 transition-colors">取消</button>
                <button type="button" onClick={saveEditTx} className="px-5 py-2.5 bg-rose-500 text-white rounded-xl text-xs font-black flex items-center gap-1 hover:bg-rose-600 transition-colors shadow-md shadow-rose-500/20"><Check size={14}/>儲存</button>
              </div>
            </div>
          );
        }

        return (
          <div key={tx.id} className="bg-white p-3.5 rounded-2xl flex items-center justify-between shadow-sm border border-gray-50 hover:border-rose-100 transition-colors group w-full relative">
            <div className="flex flex-col gap-1.5 flex-1 pr-2 min-w-0">
              <span className="text-[10px] font-black text-gray-400 bg-gray-100 px-2 py-0.5 rounded-md w-fit tracking-wider">{tx.date}</span>
              <span className="font-bold text-gray-700 flex items-center gap-1.5 truncate text-sm">
                {tx.isCompleted && <CheckCircle2 size={16} className="text-green-500 shrink-0" />} 
                <span className="truncate">{tx.title}</span>
              </span>
            </div>
            <div className="flex items-center gap-2 shrink-0">
              <span className={`font-black text-lg ${tx.type === 'income' ? 'text-green-500' : 'text-rose-500'}`}>
                {tx.type === 'income' ? '+' : '-'}${tx.amount.toLocaleString()}
              </span>
              {/* 修正：增加 gap-1.5 和 padding (p-2) 讓手機版更容易按到，並補上 type="button" */}
              <div className="flex flex-col gap-1.5 pl-2 border-l border-gray-100 ml-1">
                <button type="button" onClick={(e) => startEditTx(tx, e)} className="p-2 text-gray-300 hover:text-blue-500 hover:bg-blue-50 rounded-xl transition-colors cursor-pointer"><Edit2 size={16} /></button>
                <button type="button" onClick={(e) => deleteTx(tx.id, e)} className="p-2 text-gray-300 hover:text-rose-500 hover:bg-rose-50 rounded-xl transition-colors cursor-pointer"><Trash2 size={16} /></button>
              </div>
            </div>
          </div>
        );
      };

      if (isAuthLoading) {
        return <div className="min-h-screen bg-[#FDF8F5] flex items-center justify-center font-black text-rose-400 text-xl tracking-widest">載入中...</div>;
      }

      if (!user) {
        return (
          <div className="min-h-screen bg-[#FDF8F5] flex items-center justify-center p-4 font-sans text-gray-800">
            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-[0_10px_40px_rgba(0,0,0,0.05)] border border-rose-50 text-center relative overflow-hidden">
              <div className="absolute top-[-40px] right-[-40px] w-32 h-32 bg-rose-200/40 rounded-full blur-3xl"></div>
              <BookHeart size={56} className="text-rose-400 mx-auto mb-5 relative z-10" />
              <h1 className="text-2xl font-black text-gray-800 mb-2 relative z-10">家族理財秘書</h1>
              <p className="text-sm font-bold text-gray-400 mb-8 relative z-10">請登入以啟用雲端同步<br/>保護妳的每一筆帳務紀錄！</p>
              {loginError && <p className="text-xs text-rose-500 font-bold mb-4 bg-rose-50 py-2 rounded-lg">{loginError}</p>}
              <button onClick={loginWithGoogle} className="w-full bg-gray-900 hover:bg-gray-800 text-white py-4 rounded-2xl font-black text-lg active:scale-95 shadow-lg shadow-gray-900/20 relative z-10 flex items-center justify-center gap-2 transition-all">
                <svg className="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M12.24 10.285V14.4h6.806c-.275 1.765-2.056 5.174-6.806 5.174-4.095 0-7.439-3.389-7.439-7.574s3.345-7.574 7.439-7.574c2.33 0 3.891.989 4.785 1.849l3.254-3.138C18.189 1.186 15.479 0 12.24 0c-6.635 0-12 5.365-12 12s5.365 12 12 12c6.926 0 11.52-4.869 11.52-11.726 0-.788-.085-1.39-.189-1.989H12.24z"/></svg>
                使用 Google 帳號登入
              </button>
            </div>
          </div>
        );
      }

      if (books.length === 0) {
        return <div className="min-h-screen bg-[#FDF8F5] flex items-center justify-center font-black text-rose-400 text-xl tracking-widest">初始化專屬帳本中...</div>;
      }

      return (
        <div className="min-h-screen bg-[#FDF8F5] font-sans text-gray-800 flex justify-center pb-28">
          <div className="w-full max-w-md bg-[#FDF8F5] min-h-screen flex flex-col relative">
            
            <div className="p-4 z-10 shrink-0">
              <div className="bg-white rounded-3xl p-5 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-rose-50 relative overflow-hidden">
                <div className="absolute top-[-20px] right-[-20px] w-24 h-24 bg-rose-200/50 rounded-full blur-2xl"></div>
                
                <div className="flex items-center justify-between mb-4 relative z-10">
                  <h1 className="text-xl font-black text-rose-600 flex items-center gap-2">
                    <BookHeart size={24} /> 家族理財秘書
                  </h1>
                  <div className="flex gap-2">
                    <button onClick={() => setIsShareViewOpen(true)} className="p-2 bg-rose-50 text-rose-500 rounded-full hover:bg-rose-100 transition-colors">
                      <Share2 size={18} />
                    </button>
                    <button onClick={() => setIsManageBooksOpen(true)} className="p-2 bg-rose-50 text-rose-500 rounded-full hover:bg-rose-100 transition-colors">
                      <Settings size={18} />
                    </button>
                  </div>
                </div>
                
                <div className="relative z-10 mb-4">
                  <select 
                    value={currentBookId}
                    onChange={(e) => { setCurrentBookId(e.target.value); setSelectedDate(null); }}
                    className="w-full bg-rose-50 text-rose-800 font-bold text-lg rounded-xl p-3 outline-none border border-rose-100 appearance-none shadow-inner"
                  >
                    {books.map(book => <option key={book.id} value={book.id}>{book.name}</option>)}
                  </select>
                  <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-rose-400">▼</div>
                </div>

                <div className="text-center relative z-10 mt-6 mb-2">
                  <p className="text-gray-400 text-xs font-bold mb-1">
                    {currentBook?.type === 'standard' ? '帳本歷史總餘額' : '家用月度目標金額'}
                  </p>
                  <h2 className="text-4xl font-black text-gray-800 tracking-tight flex justify-center items-center gap-1">
                    <span className="text-2xl text-rose-400">$</span>
                    {currentBook?.type === 'standard' ? currentBookTotalBalance.toLocaleString() : currentBook?.targetAmount?.toLocaleString()}
                  </h2>
                </div>
              </div>
            </div>

            <div className="px-4 pb-4 flex flex-col gap-4">
              
              {currentBook?.type === 'target' && (
                <div className="flex flex-col gap-4">
                  <div className="flex justify-between items-center px-4 bg-white py-3 rounded-2xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-rose-50">
                    <button onClick={handlePrevPeriod} className="p-2 text-rose-400 hover:bg-rose-50 rounded-full transition-colors"><ChevronLeft size={20} /></button>
                    <h3 className="text-xl font-black text-gray-700 tracking-widest">{currentYear}</h3>
                    <button onClick={handleNextPeriod} className="p-2 text-rose-400 hover:bg-rose-50 rounded-full transition-colors"><ChevronRight size={20} /></button>
                  </div>

                  <div className="bg-white p-4 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-rose-50">

                            `}>
                              {isCompleted ? (
                                <CheckCircle2 size={24} className={`${isTargetReached ? 'text-green-500 drop-shadow-sm' : 'text-emerald-300'} ${isSelected ? 'animate-bounce' : ''}`} strokeWidth={3} />
                              ) : (
                                <>
                                  <span className="text-[10px] font-black text-gray-700">{monthNum}月</span>
                                  {sum > 0 ? (
                                    <span className="text-[8px] font-bold text-rose-500 mt-0.5">${formatAmountForGrid(sum)}</span>
                                  ) : (
                                    <span className="text-[8px] text-gray-300 mt-0.5">-</span>
                                  )}
                                </>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    <div className="relative z-10">
                      <div className="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-gray-200 to-transparent"></div>
                      <div className="flex justify-between items-center mb-3 pt-4">
                        <p className="text-[10px] font-black text-rose-400 tracking-widest uppercase">{selectedMonth.replace('-', '年')}月 明細</p>
                        {getMonthData(currentYear, parseInt(selectedMonth.split('-')[1])).isCompleted && (
                           <span className="text-[9px] bg-green-100 text-green-700 px-1.5 py-0.5 rounded font-bold">已結算</span>
                        )}
                      </div>
                      
                      <div className="flex flex-col gap-2">
                        {getMonthData(currentYear, parseInt(selectedMonth.split('-')[1])).monthTxs.length === 0 ? (
                          <p className="text-xs text-gray-400 text-center py-4 bg-white/50 rounded-lg">此月無紀錄</p>
                        ) : (
                          getMonthData(currentYear, parseInt(selectedMonth.split('-')[1])).monthTxs.map(tx => (
                            <div key={tx.id} className="flex justify-between items-center text-xs bg-white/70 p-2.5 rounded-xl border border-white">
                              <span className="text-gray-600 font-bold flex-1 truncate flex items-center gap-1.5">
                                <span className="text-[9px] bg-white text-rose-300 px-1 rounded shadow-sm">{tx.date.slice(5)}</span>
                                {tx.title}
                              </span>
                              <span className="font-black text-green-500 ml-2">+{tx.amount.toLocaleString()}</span>
                            </div>
                          ))
                        )}
                      </div>
                    </div>
                  </>
                )}
              </div>
              <button onClick={() => setIsShareViewOpen(false)} className="mt-6 px-10 py-4 bg-white/10 hover:bg-white/20 text-white rounded-full font-black text-sm transition-colors backdrop-blur-sm shrink-0">關閉截圖畫面</button>
            </div>
          )}

        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
